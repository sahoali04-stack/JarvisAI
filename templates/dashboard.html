<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
body {
    font-family: Arial;
    background: #0b1220;
    color: white;
    margin: 0;
}

.container {
    padding: 20px;
    display: flex;
    gap: 20px;
}

.card {
    background: #1f2937;
    padding: 20px;
    flex: 1;
    border-radius: 10px;
    text-align: center;
}

.big {
    font-size: 30px;
    color: #22c55e;
}
</style>
</head>

<body>

<h2 style="text-align:center;">📊 SaaS Dashboard</h2>

<div class="container">

<div class="card">
Users
<div class="big">{{ users }}</div>
</div>

<div class="card">
Messages
<div class="big">{{ messages }}</div>
</div>

<div class="card">
Paid Users
<div class="big">{{ paid }}</div>
</div>

</div>

</body>
</html>
