<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Jarvis Voice SaaS</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#0b1220;
    color:white;
    height:100vh;
    display:flex;
    flex-direction:column;
}

/* HEADER */
.header{
    background:#111827;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-weight:bold;
}

.header a{
    color:#22c55e;
    text-decoration:none;
}

/* CHAT */
.chat{
    flex:1;
    overflow-y:auto;
    padding:20px;
    display:flex;
    flex-direction:column;
    gap:12px;
}

/* MESSAGES */
.msg{
    padding:12px;
    border-radius:12px;
    max-width:70%;
    word-wrap:break-word;
}

.user{
    align-self:flex-end;
    background:#2563eb;
}

.bot{
    align-self:flex-start;
    background:#1f2937;
}

/* INPUT AREA */
.input-area{
    display:flex;
    padding:15px;
    background:#111827;
    gap:10px;
}

input{
    flex:1;
    padding:12px;
    border:none;
    border-radius:10px;
    outline:none;
    font-size:15px;
}

/* BUTTONS */
button{
    border:none;
    padding:12px 16px;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

.send-btn{
    background:#22c55e;
}

.voice-btn{
    background:#f59e0b;
    color:white;
}

button:hover{
    opacity:0.9;
}

/* STATUS */
.status{
    text-align:center;
    font-size:13px;
    opacity:0.7;
    padding:5px;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div>🤖 Jarvis Voice SaaS</div>

    <div>
        <a href="/dashboard">Dashboard</a>
    </div>
</div>

<!-- CHAT -->
<div class="chat" id="chat"></div>

<!-- STATUS -->
<div class="status" id="status">
    Ready
</div>

<!-- INPUT -->
<div class="input-area">

    <input
        id="message"
        placeholder="Ask Jarvis anything..."
    >

    <button
        class="voice-btn"
        onclick="startVoice()"
    >
        🎤
    </button>

    <button
        class="send-btn"
        onclick="sendMessage()"
    >
        Send
    </button>

</div>

<script>

const chat = document.getElementById("chat");
const input = document.getElementById("message");
const statusText = document.getElementById("status");

/* SEND MESSAGE */
async function sendMessage(){

    let message = input.value.trim();

    if(message === "") return;

    // USER MSG
    chat.innerHTML += `
        <div class="msg user">
            ${message}
        </div>
    `;

    chat.scrollTop = chat.scrollHeight;

    input.value = "";

    statusText.innerHTML = "Jarvis thinking...";

    // SEND TO FLASK
    let response = await fetch("/chat",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            message:message
        })
    });

    let data = await response.json();

    // BOT MSG
    chat.innerHTML += `
        <div class="msg bot">
            🤖 ${data.reply}
        </div>
    `;

    chat.scrollTop = chat.scrollHeight;

    statusText.innerHTML = "Ready";

    // SPEAK RESPONSE
    speak(data.reply);
}

/* ENTER KEY */
input.addEventListener("keypress",function(e){
    if(e.key === "Enter"){
        sendMessage();
    }
});

/* TEXT TO SPEECH */
function speak(text){

    let speech = new SpeechSynthesisUtterance();

    speech.text = text;

    speech.rate = 1;

    speech.pitch = 1;

    speech.volume = 1;

    window.speechSynthesis.speak(speech);
}

/* VOICE INPUT */
function startVoice(){

    if(!('webkitSpeechRecognition' in window)){

        alert("Voice recognition not supported");

        return;
    }

    let recognition = new webkitSpeechRecognition();

    recognition.lang = "en-US";

    recognition.start();

    statusText.innerHTML = "🎤 Listening...";

    recognition.onresult = function(event){

        let transcript = event.results[0][0].transcript;

        input.value = transcript;

        statusText.innerHTML = "Voice detected";

        sendMessage();
    };

    recognition.onerror = function(){

        statusText.innerHTML = "Voice error";
    };

    recognition.onend = function(){

        statusText.innerHTML = "Ready";
    };
}

</script>

</body>
</html>
